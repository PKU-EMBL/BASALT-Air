[workspace]
name = "BASALT"
version = "1.2.0"
description = "Modular metagenomic binning and refinement pipeline"
authors = ["BASALT contributors"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# CUDA 12.x runtime — pixi will pick GPU pytorch variants matching this.
# L40S + driver 580 (reports CUDA 13) is forward-compatible with CUDA 12 builds.
[system-requirements]
cuda = "12"

# ---------- Conda dependencies (Python + bioinformatics tools) ----------
[dependencies]
python = "3.12.*"
perl   = "*"

# Python libs needed by BASALT
biopython    = "*"
pandas       = "*"
numpy        = "*"
scikit-learn = "*"
pytorch-gpu  = "*"

# Binners
metabat2 = "*"
maxbin2  = "*"
concoct  = "*"
semibin  = "*"
# Optional extra binners (`-e v` / `-e l`) are NOT bundled in this env:
#   * VAMB 4.x is pinned to Python 3.11 (incompatible with our 3.12 base);
#     VAMB 5.x demands a newer PyTorch that conflicts with the rest of
#     the bioconda graph here. If you need `-e v`, create a separate
#     conda env: `conda create -n vamb_env -c bioconda 'vamb>=5'` and
#     prepend its bin/ to $PATH before invoking BASALT.
#   * LorBin is not on conda/PyPI; install it from its repository and
#     ensure the `LorBin` binary is on $PATH.
# `BASALT --check-deps -e v,l` reports the per-tool status without
# launching the pipeline.

# Quality control
checkm2 = "*"

# Aligners
bowtie2  = "*"
bwa      = "*"
samtools = "*"
minimap2 = "*"

# Annotation / search
blast    = "*"
diamond  = "*"
hmmer    = "*"
prodigal = "*"

# Assemblers / polishing
spades    = "*"
unicycler = "*"
idba      = "*"
racon     = "*"
pilon     = "*"
miniasm   = "*"
megahit   = "*"

# Utilities
pplacer        = "*"
bedtools       = "*"
entrez-direct  = "*"
ncbi-vdb       = "*"

# ---------- Editable install of BASALT itself ----------
[pypi-dependencies]
BASALT = { path = ".", editable = true }

# ---------- Env vars set automatically when entering the env ----------
[activation.env]
BASALT_WEIGHT = "/scratch2/mz32/zhaorui/weight/BASALT"
CHECKM2DB     = "/fs04/scratch2/mz32/zhaorui/db/checkm2db/CheckM2_database/uniref100.KO.1.dmnd"
# CHECKM_DATA_PATH = "/fs04/scratch2/mz32/zhaorui/checkmdb"   # only set if running -q checkm (legacy CheckM)

# ---------- Convenience tasks ----------
# Run any of these from the repo root with: pixi run <task-name>
[tasks]
help             = "BASALT --help"
version          = "BASALT --version"
check-deps       = "BASALT --check-deps"
download-weights = "BASALT_models_download --path $BASALT_WEIGHT"
checkm2-db       = "checkm2 database --download --path /fs04/scratch2/mz32/zhaorui/checkm2db"
# Quick health check: package imports + console-script reachable + version pin matches.
sanity = "python -c 'import basalt; from basalt.cli import main; from basalt.logger import setup_logger; print(\"basalt\", basalt.__version__, \"sanity OK\")'"
