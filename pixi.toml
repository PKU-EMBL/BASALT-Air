[workspace]
name = "BASALT-Air"
version = "1.0.0"
description = "Lightweight modular metagenomic binning and refinement pipeline"
authors = ["BASALT contributors"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# CUDA runtime — pixi will pick GPU pytorch variants matching this.
# L40S + driver 580 (reports CUDA 13) is forward-compatible with CUDA 12 builds.
# Users can modify this value based on their CUDA version (e.g., "11", "12", "13")
[system-requirements]
linux = "4.15.0"
libc = { family = "glibc", version = "2.23" }
cuda = "12"

# ---------- Conda dependencies (Python + bioinformatics tools) ----------
[dependencies]
python = "3.12.*"
perl   = "*"

# Python libs needed by BASALT-Air
biopython    = "*"
pandas       = "*"
numpy        = "*"
scikit-learn = "*"
pytorch-gpu  = "*"
libopenblas  = "*"  # BLAS library for numerical operations

# System compatibility layer for older Linux systems
sysroot_linux-64 = ">=2.17"  # Provides GLIBC 2.17+ for CheckM2/TensorFlow compatibility

# Binners
metabat2 = "*"
maxbin2  = "*"
concoct  = "*"
semibin  = "*"
# Optional extra binners (`-e v` / `-e l`) are NOT bundled in this env:
#   * VAMB 4.x is pinned to Python 3.11 (incompatible with our 3.12 base);
#     VAMB 5.x demands a newer PyTorch that conflicts with the rest of
#     the bioconda graph here. If you need `-e v`, create a separate
#     conda env: `conda create -n vamb_env -c bioconda 'vamb>=5'` and
#     prepend its bin/ to $PATH before invoking basalt.
#   * LorBin is not on conda/PyPI; install it from its repository and
#     ensure the `LorBin` binary is on $PATH.
# `basalt --check-deps -e v,l` reports the per-tool status without
# launching the pipeline.

# Quality control
checkm2 = "*"

# Aligners
bowtie2  = "*"
bwa      = "*"
samtools = "*"
minimap2 = "*"

# Annotation / search
blast    = "*"
diamond  = "*"
hmmer    = "*"
prodigal = "*"

# Assemblers / polishing
spades    = "*"
unicycler = "*"
idba      = "*"
racon     = "*"
pilon     = "*"
miniasm   = "*"
megahit   = "*"

# Utilities
pplacer        = "*"
bedtools       = "*"
entrez-direct  = "*"
ncbi-vdb       = "*"

# ---------- Editable install of BASALT-Air itself ----------
[pypi-dependencies]
BASALT-Air = { path = ".", editable = true }

# ---------- Env vars set automatically when entering the env ----------
# IMPORTANT: Users MUST edit these paths before first use!
# These paths are specific to your system and must point to:
#   - BASALT_WEIGHT: directory where model weights will be downloaded
#   - CHECKM2DB: path to CheckM2 DIAMOND database file
#   - CHECKM_DATA_PATH: (optional) path to legacy CheckM database
[activation.env]
BASALT_WEIGHT = "/home/yuke/db/BASALT"  # CHANGE THIS: Set your model weights directory
CHECKM2DB     = "/home/yuke/db/checkm2db/uniref100.KO.1.dmnd"  # CHANGE THIS: Set your CheckM2 DB path
# CHECKM_DATA_PATH = "/home/yuke/db/checkmdb"   # CHANGE THIS if running -q checkm (legacy CheckM)

# ---------- Convenience tasks ----------
# Run any of these from the repo root with: pixi run <task-name>
[tasks]
help             = "basalt --help"
version          = "basalt --version"
check-deps       = "basalt --check-deps"
download-weights = "basalt_models_download --path $BASALT_WEIGHT"
checkm2-db       = "checkm2 database --download --path $(dirname $CHECKM2DB)"
# Quick health check: package imports + console-script reachable + version pin matches.
sanity = "python -c 'import basalt; from basalt.cli import main; from basalt.logger import setup_logger; print(\"BASALT-Air\", basalt.__version__, \"sanity OK\")'"
